<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>자율주행 확률적 의사결정 시뮬레이션</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#0f0f1a;color:#e0e0e0;font-family:'Segoe UI',sans-serif;
       display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:16px;}
  h1{font-size:1.3rem;color:#7dd3fc;margin-bottom:12px;text-align:center;letter-spacing:1px;}
  .container{display:flex;gap:16px;width:100%;max-width:1000px;flex-wrap:wrap;justify-content:center;}
  canvas{border:2px solid #334155;border-radius:10px;flex-shrink:0;}
  .panel{display:flex;flex-direction:column;gap:10px;min-width:260px;flex:1;}
  .card{background:#1e293b;border:1px solid #334155;border-radius:10px;padding:14px;}
  .card h3{font-size:.75rem;color:#94a3b8;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;}
  .state-row{display:flex;justify-content:space-between;align-items:center;margin:5px 0;font-size:.85rem;}
  .badge{padding:2px 10px;border-radius:20px;font-size:.75rem;font-weight:bold;}
  .badge-go{background:#166534;color:#86efac;} .badge-slow{background:#713f12;color:#fde68a;}
  .badge-stop{background:#7f1d1d;color:#fca5a5;} .badge-left{background:#1e3a5f;color:#93c5fd;}
  .badge-right{background:#3b1f6e;color:#c4b5fd;}
  .prob-bar-wrap{margin:6px 0;}
  .prob-label{display:flex;justify-content:space-between;font-size:.78rem;margin-bottom:3px;}
  .prob-bar-bg{background:#0f172a;border-radius:4px;height:10px;overflow:hidden;}
  .prob-bar{height:10px;border-radius:4px;transition:width .3s;}
  .ev-box{background:#0f172a;border-radius:8px;padding:10px;margin-top:6px;}
  .ev-row{display:flex;justify-content:space-between;font-size:.8rem;margin:3px 0;}
  .chosen{color:#34d399;font-weight:bold;}
  .log{height:130px;overflow-y:auto;font-size:.75rem;line-height:1.7;color:#94a3b8;}
  .log span{display:block;}
  .log .log-go{color:#86efac;} .log .log-slow{color:#fde68a;}
  .log .log-change{color:#93c5fd;} .log .log-stop{color:#fca5a5;}
  .controls{display:flex;gap:10px;margin-top:6px;flex-wrap:wrap;}
  button{padding:7px 16px;border:none;border-radius:7px;cursor:pointer;font-size:.82rem;font-weight:bold;}
  .btn-start{background:#0ea5e9;color:#fff;} .btn-start:hover{background:#38bdf8;}
  .btn-pause{background:#475569;color:#fff;} .btn-pause:hover{background:#64748b;}
  .speed-row{display:flex;align-items:center;gap:8px;font-size:.8rem;}
  input[type=range]{flex:1;accent-color:#7dd3fc;}
  .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
  .stat-item{background:#0f172a;border-radius:7px;padding:8px;text-align:center;}
  .stat-val{font-size:1.2rem;font-weight:bold;color:#7dd3fc;}
  .stat-lbl{font-size:.68rem;color:#64748b;margin-top:2px;}
</style>
</head>
<body>
<h1>🚗 자율주행 확률적 의사결정 시뮬레이션</h1>
<div class="container">
  <canvas id="sim" width="480" height="560"></canvas>
  <div class="panel">
    <div class="card">
      <h3>📍 현재 상태</h3>
      <div class="state-row"><span>속도</span><span id="spd">0 km/h</span></div>
      <div class="state-row"><span>차선</span><span id="lane">1차선</span></div>
      <div class="state-row"><span>전방 장애물</span><span id="obs">없음</span></div>
      <div class="state-row"><span>현재 행동</span><span id="action" class="badge badge-go">GO</span></div>
    </div>
    <div class="card">
      <h3>📊 행동별 확률 분포</h3>
      <div class="prob-bar-wrap"><div class="prob-label"><span>직진 유지</span><span id="p-go">0%</span></div>
        <div class="prob-bar-bg"><div class="prob-bar" id="bar-go" style="width:0%;background:#34d399"></div></div></div>
      <div class="prob-bar-wrap"><div class="prob-label"><span>감속</span><span id="p-slow">0%</span></div>
        <div class="prob-bar-bg"><div class="prob-bar" id="bar-slow" style="width:0%;background:#fbbf24"></div></div></div>
      <div class="prob-bar-wrap"><div class="prob-label"><span>차선 변경 (좌)</span><span id="p-left">0%</span></div>
        <div class="prob-bar-bg"><div class="prob-bar" id="bar-left" style="width:0%;background:#60a5fa"></div></div></div>
      <div class="prob-bar-wrap"><div class="prob-label"><span>차선 변경 (우)</span><span id="p-right">0%</span></div>
        <div class="prob-bar-bg"><div class="prob-bar" id="bar-right" style="width:0%;background:#c084fc"></div></div></div>
      <div class="prob-bar-wrap"><div class="prob-label"><span>급정지</span><span id="p-stop">0%</span></div>
        <div class="prob-bar-bg"><div class="prob-bar" id="bar-stop" style="width:0%;background:#f87171"></div></div></div>
    </div>
    <div class="card">
      <h3>🔢 기댓값(EV) 계산</h3>
      <div class="ev-box">
        <div class="ev-row"><span>직진</span><span id="ev-go">-</span></div>
        <div class="ev-row"><span>감속</span><span id="ev-slow">-</span></div>
        <div class="ev-row"><span>차선변경</span><span id="ev-lane">-</span></div>
        <div class="ev-row"><span>급정지</span><span id="ev-stop">-</span></div>
        <div class="ev-row" style="margin-top:6px;border-top:1px solid #334155;padding-top:6px;">
          <span style="color:#94a3b8">선택된 행동</span><span id="ev-chosen" class="chosen">-</span>
        </div>
      </div>
    </div>
    <div class="card">
      <h3>📈 누적 통계</h3>
      <div class="stat-grid">
        <div class="stat-item"><div class="stat-val" id="st-dist">0</div><div class="stat-lbl">이동 거리(m)</div></div>
        <div class="stat-item"><div class="stat-val" id="st-avoid">0</div><div class="stat-lbl">장애물 회피</div></div>
        <div class="stat-item"><div class="stat-val" id="st-change">0</div><div class="stat-lbl">차선 변경</div></div>
        <div class="stat-item"><div class="stat-val" id="st-risk">0</div><div class="stat-lbl">위험 이벤트</div></div>
      </div>
    </div>
    <div class="card"><h3>📋 결정 로그</h3><div class="log" id="log"></div></div>
    <div class="card">
      <h3>⚙️ 컨트롤</h3>
      <div class="controls">
        <button class="btn-start" id="btn-toggle" onclick="toggleSim()">▶ 시작</button>
        <button class="btn-pause" onclick="resetSim()">↺ 초기화</button>
      </div>
      <div class="speed-row" style="margin-top:10px;">
        <span>시뮬레이션 속도</span>
        <input type="range" id="simspeed" min="1" max="5" value="2" oninput="updateSimSpeed(this.value)">
        <span id="speed-lbl">x2</span>
      </div>
    </div>
  </div>
</div>
<script>
const canvas = document.getElementById('sim');
const ctx    = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

const LANES = 3, ROAD_X = 60, ROAD_W = 360, LANE_W = ROAD_W / LANES;
const LC = [ROAD_X + LANE_W * 0.5, ROAD_X + LANE_W * 1.5, ROAD_X + LANE_W * 2.5];
const EW = 28, EH = 50, OW = 26, OH = 44, GAP = 10;
const SEY = H - 100; // 자차 고정 screen y (car top)
const CRUISE = 90, BRAKE_START = 160;
const MAX_ACCEL = 30, MAX_BRAKE = 120;

// 절대 좌표계: wy 클수록 전방(화면 위)
// screen y = SEY + ego_wy - o.wy
let ego_wy = 0;
const ego = { x: LC[1], lane: 1, spd: CRUISE, w: EW, h: EH, color: '#38bdf8', tx: LC[1], changing: false };
let obstacles = [], roadOff = 0, running = false, simSpd = 2;
let stats = { dist: 0, avoid: 0, change: 0, risk: 0 };
let decTimer = 0, curAction = 'go', frame = 0, oid = 0, nextSpawnDist = 100;

// ── 좌표 변환 ─────────────────────────────────────────
function scy(o) { return SEY + ego_wy - o.wy; }

// ── 거리 ──────────────────────────────────────────────
// gap = o.wy - ego_wy - OH  (양수=앞쪽 여유, 음수=겹침)
function frontGap(lane) {
  let best = 9999;
  for (const o of obstacles) {
    if (o.lane !== lane) continue;
    const g = o.wy - ego_wy - OH;
    if (g > -EH && g < 350) best = Math.min(best, g);
  }
  return best;
}
function frontCar(lane) {
  let best = null, bd = 9999;
  for (const o of obstacles) {
    if (o.lane !== lane) continue;
    const g = o.wy - ego_wy - OH;
    if (g >= -EH && g < bd) { bd = g; best = o; }
  }
  return best;
}

// 차선 변경 안전: 앞 버퍼 EH*3, 뒤 버퍼 EH*2
function isLaneSafe(tl) {
  for (const o of obstacles) {
    if (o.lane !== tl) continue;
    const fwdGap  = o.wy - ego_wy - OH;      // 앞쪽 gap
    const bwdGap  = ego_wy - o.wy - EH;      // 뒤쪽 gap (양수 = 자차 뒤에 있음)
    if (fwdGap > -EH  && fwdGap < EH * 3) return false;
    if (bwdGap >= 0   && bwdGap < EH * 2) return false;
  }
  return true;
}

// ── 스폰: 화면 위 300px 밖 ──────────────────────────
function spawn() {
  const lane = Math.floor(Math.random() * 3);
  const spawnWy = ego_wy + SEY + 300;
  if (obstacles.some(o => o.lane === lane && Math.abs(o.wy - spawnWy) < OH * 3)) return;
  obstacles.push({
    x: LC[lane], wy: spawnWy, lane,
    spd: 16 + Math.random() * 24,   // 16~40: 항상 자차보다 느림
    w: OW, h: OH,
    color: 'hsl(' + Math.floor(Math.random() * 40) + ',70%,55%)',
    id: oid++, entered: false, passed: false
  });
}

// ── 물리 ──────────────────────────────────────────────
function moveAll(dt) {
  ego_wy += ego.spd * dt;
  for (const o of obstacles) o.wy += o.spd * dt;
}

function clampObsObs() {
  for (let l = 0; l < LANES; l++) {
    const same = obstacles.filter(o => o.lane === l).sort((a, b) => b.wy - a.wy); // 앞차 먼저
    for (let i = 1; i < same.length; i++) {
      const fr = same[i - 1], rr = same[i]; // fr=앞(큰 wy), rr=뒤(작은 wy)
      const gap = fr.wy - rr.wy - OH;
      if (gap < GAP) {
        if (rr.spd > fr.spd) rr.spd = fr.spd;
        if (gap < 0) rr.wy = fr.wy - OH - GAP;
      }
    }
  }
}

// ★ 핵심 수정: o.wy >= ego_wy (자차 앞) 인 차량만 clamp
// 자차 뒤(o.wy < ego_wy)는 절대 건드리지 않음 → 차선변경 후 갑자기 생성 버그 차단
function clampEgoObs() {
  const lanes = new Set([ego.lane]);
  if (ego.changing) {
    for (let l = 0; l < LANES; l++) {
      if (Math.abs(ego.x - LC[l]) < LANE_W * 0.75) lanes.add(l);
    }
  }
  for (const o of obstacles) {
    if (!lanes.has(o.lane)) continue;
    if (o.wy < ego_wy) continue; // 자차 뒤쪽 → 무시
    const gap = o.wy - ego_wy - OH;
    if (gap < GAP) {
      o.wy = ego_wy + OH + GAP;
      if (o.spd < ego.spd) o.spd = ego.spd;
      if (gap < 0) stats.risk++;
    }
  }
}

function egoPhysics(dt) {
  const gap = frontGap(ego.lane);
  let target = CRUISE;
  if (gap < BRAKE_START) {
    const fc = frontCar(ego.lane);
    const t = Math.max(0, (BRAKE_START - gap) / (BRAKE_START - GAP));
    target = Math.max(5, (fc ? fc.spd : 0) + (CRUISE - (fc ? fc.spd : 0)) * (1 - t));
  }
  const diff = target - ego.spd;
  const lim = diff > 0 ? MAX_ACCEL * dt : MAX_BRAKE * dt;
  ego.spd += Math.max(-lim, Math.min(lim, diff));
  ego.spd = Math.max(5, Math.min(120, ego.spd));
}

// ── 타차 수명 ─────────────────────────────────────────
function updateObsLifetime() {
  for (const o of obstacles) if (!o.entered && scy(o) >= -OH) o.entered = true;
  obstacles = obstacles.filter(function(o) {
    const sy = scy(o);
    if (!o.entered) return true;          // 아직 화면 미진입 → 유지
    if (sy < -OH - 20) return false;      // 진입 후 다시 위로 → 제거
    if (sy > H + 100)  return false;      // 화면 아래 → 제거
    return true;
  });
}

// ── 확률적 의사결정 ───────────────────────────────────
function computeProbs() {
  const dF = frontGap(ego.lane);
  const dL = ego.lane > 0 ? frontGap(ego.lane - 1) : 0;
  const dR = ego.lane < 2 ? frontGap(ego.lane + 1) : 0;
  const SAFE = 160, DANGER = 55;
  let go, slow, left = 0, right = 0, stop = 0;
  if (dF >= SAFE) {
    go = 0.92; slow = 0.04; stop = 0.01;
    left  = ego.lane > 0 ? 0.02 : 0;
    right = ego.lane < 2 ? 0.02 : 0;
  } else if (dF > DANGER) {
    const t = (SAFE - dF) / (SAFE - DANGER);
    go   = Math.max(0.1, 0.7 - t * 0.5);
    slow = 0.1 + t * 0.25;
    left  = ego.lane > 0 ? (dL > dF ? 0.15 + Math.random() * 0.1 : 0.04) : 0;
    right = ego.lane < 2 ? (dR > dF ? 0.15 + Math.random() * 0.1 : 0.04) : 0;
    stop = 0.03 + t * 0.05;
  } else {
    go = 0.03; slow = 0.07;
    left  = ego.lane > 0 ? (dL > 80 ? 0.45 + Math.random() * 0.1 : 0.05) : 0;
    right = ego.lane < 2 ? (dR > 80 ? 0.45 + Math.random() * 0.1 : 0.05) : 0;
    stop = Math.max(0, 0.4 - left - right);
  }
  const s = go + slow + left + right + stop || 1;
  return { go: go/s, slow: slow/s, left: left/s, right: right/s, stop: stop/s, dF: dF, dL: dL, dR: dR };
}
function sample(p) {
  const r = Math.random(); let c = 0;
  if ((c += p.go)   >= r) return 'go';
  if ((c += p.slow) >= r) return 'slow';
  if ((c += p.left) >= r) return 'left';
  if ((c += p.right)>= r) return 'right';
  return 'stop';
}
function applyAction(a, dF) {
  switch (a) {
    case 'go':   if (dF >= BRAKE_START) ego.spd = Math.min(120, ego.spd + 4); break;
    case 'slow': if (dF <  BRAKE_START) ego.spd = Math.max(15,  ego.spd - 8); break;
    case 'stop': if (dF <  BRAKE_START) ego.spd = Math.max(5,   ego.spd - 15); break;
    case 'left':
      if (ego.lane > 0 && !ego.changing && isLaneSafe(ego.lane - 1)) {
        ego.lane--; ego.tx = LC[ego.lane]; ego.changing = true;
        setTimeout(function() { ego.changing = false; }, 600);
        stats.change++; addLog('차선 변경 <- (좌)', 'log-change');
      } break;
    case 'right':
      if (ego.lane < 2 && !ego.changing && isLaneSafe(ego.lane + 1)) {
        ego.lane++; ego.tx = LC[ego.lane]; ego.changing = true;
        setTimeout(function() { ego.changing = false; }, 600);
        stats.change++; addLog('차선 변경 -> (우)', 'log-change');
      } break;
  }
}
function decide() {
  const p = computeProbs();
  curAction = sample(p);
  applyAction(curAction, p.dF);
  updateUI(p, curAction);
  const m = { go: '직진 유지 🟢', slow: '감속 🟡', stop: '급정지 🔴' };
  if (curAction in m) addLog(m[curAction], 'log-' + curAction);
}

// ── UI ────────────────────────────────────────────────
function pct(v) { return (v * 100).toFixed(1) + '%'; }
function calcEV(p) {
  return {
    go:   (p.dF / 300 * 100 - (p.dF < 60 ? 40 : 0)).toFixed(1),
    slow: (p.dF / 300 * 70 - 5).toFixed(1),
    lane: (Math.max(p.dL, p.dR) / 300 * 90 - 8).toFixed(1),
    stop: (-20).toFixed(1)
  };
}
function updateUI(p, a) {
  document.getElementById('spd').textContent  = Math.round(ego.spd) + ' km/h';
  document.getElementById('lane').textContent = (ego.lane + 1) + '차선';
  document.getElementById('obs').textContent  = p.dF < 9000 ? Math.round(p.dF) + 'm' : '없음';
  const lbl = { go: 'GO', slow: '감속', left: '←차선', right: '→차선', stop: '정지' };
  const cls = { go: 'badge-go', slow: 'badge-slow', left: 'badge-left', right: 'badge-right', stop: 'badge-stop' };
  const el = document.getElementById('action');
  el.textContent = lbl[a]; el.className = 'badge ' + cls[a];
  ['go','slow','left','right','stop'].forEach(function(k) {
    document.getElementById('p-' + k).textContent = pct(p[k] || 0);
    document.getElementById('bar-' + k).style.width = ((p[k] || 0) * 100) + '%';
  });
  const ev = calcEV(p);
  ['go','slow','lane','stop'].forEach(function(k) {
    document.getElementById('ev-' + k).textContent = ev[k];
  });
  document.getElementById('ev-chosen').textContent = lbl[a];
  document.getElementById('st-dist').textContent   = Math.round(stats.dist);
  document.getElementById('st-avoid').textContent  = stats.avoid;
  document.getElementById('st-change').textContent = stats.change;
  document.getElementById('st-risk').textContent   = stats.risk;
}
function addLog(msg, cls) {
  const log = document.getElementById('log');
  const sp = document.createElement('span');
  sp.className = cls;
  sp.textContent = '[' + String(Math.floor(stats.dist)).padStart(4, '0') + 'm] ' + msg;
  log.appendChild(sp);
  if (log.children.length > 60) log.removeChild(log.firstChild);
  log.scrollTop = log.scrollHeight;
}

// ── 렌더링 ────────────────────────────────────────────
function darken(hexColor, amount) {
  var r = parseInt(hexColor.slice(1, 3), 16);
  var g = parseInt(hexColor.slice(3, 5), 16);
  var b = parseInt(hexColor.slice(5, 7), 16);
  r = Math.max(0, Math.min(255, r + amount));
  g = Math.max(0, Math.min(255, g + amount));
  b = Math.max(0, Math.min(255, b + amount));
  return 'rgb(' + r + ',' + g + ',' + b + ')';
}
function hexToRgb(h) {
  // hsl() 색상도 처리하기 위해 canvas 임시 렌더 사용
  var tmp = document.createElement('canvas');
  tmp.width = tmp.height = 1;
  var c = tmp.getContext('2d');
  c.fillStyle = h;
  c.fillRect(0, 0, 1, 1);
  var d = c.getImageData(0, 0, 1, 1).data;
  return 'rgb(' + d[0] + ',' + d[1] + ',' + d[2] + ')';
}
function darkenColor(colorStr, amount) {
  // hsl / hex 모두 처리
  var tmp = document.createElement('canvas');
  tmp.width = tmp.height = 1;
  var c = tmp.getContext('2d');
  c.fillStyle = colorStr;
  c.fillRect(0, 0, 1, 1);
  var d = c.getImageData(0, 0, 1, 1).data;
  var r = Math.max(0, Math.min(255, d[0] + amount));
  var g = Math.max(0, Math.min(255, d[1] + amount));
  var b = Math.max(0, Math.min(255, d[2] + amount));
  return 'rgb(' + r + ',' + g + ',' + b + ')';
}

function drawRoad() {
  ctx.fillStyle = '#1a1a2e'; ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#374151'; ctx.fillRect(ROAD_X, 0, ROAD_W, H);
  ctx.strokeStyle = '#f59e0b'; ctx.lineWidth = 3; ctx.setLineDash([]);
  ctx.beginPath(); ctx.moveTo(ROAD_X, 0); ctx.lineTo(ROAD_X, H); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(ROAD_X + ROAD_W, 0); ctx.lineTo(ROAD_X + ROAD_W, H); ctx.stroke();
  ctx.setLineDash([28, 18]); ctx.strokeStyle = '#d1d5db'; ctx.lineWidth = 2;
  for (var i = 1; i < LANES; i++) {
    ctx.beginPath(); ctx.moveTo(ROAD_X + i * LANE_W, 0); ctx.lineTo(ROAD_X + i * LANE_W, H); ctx.stroke();
  }
  ctx.setLineDash([]);
  ctx.fillStyle = '#4b5563';
  for (var y = (roadOff % 80) - 80; y < H + 80; y += 80)
    for (var l = 0; l < LANES; l++)
      ctx.fillRect(ROAD_X + l * LANE_W + LANE_W / 2 - 3, y, 6, 30);
}

function drawCar(x, y, w, h, color, label, glow) {
  ctx.save();
  if (glow) { ctx.shadowColor = color; ctx.shadowBlur = 18; }
  var darkColor = darkenColor(color, -40);
  var grad = ctx.createLinearGradient(x - w / 2, y, x + w / 2, y + h);
  grad.addColorStop(0, color);
  grad.addColorStop(1, darkColor);
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.roundRect(x - w / 2, y, w, h, 6);
  ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.fillRect(x - w / 2 + 4, y + 8, w - 8, h * 0.28);
  ctx.fillStyle = '#111';
  [[x - w/2 - 2, y + 6], [x + w/2 - 4, y + 6],
   [x - w/2 - 2, y + h - 14], [x + w/2 - 4, y + h - 14]].forEach(function(pt) {
    ctx.fillRect(pt[0], pt[1], 6, 10);
  });
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 8px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(label, x, y + h - 4);
  ctx.restore();
}

function drawArc() {
  var grad = ctx.createRadialGradient(ego.x, SEY, 10, ego.x, SEY, 180);
  grad.addColorStop(0, 'rgba(56,189,248,0.12)');
  grad.addColorStop(1, 'rgba(56,189,248,0)');
  ctx.fillStyle = grad;
  ctx.beginPath(); ctx.moveTo(ego.x, SEY);
  ctx.arc(ego.x, SEY, 180, -Math.PI * 0.6, -Math.PI * 0.4, false);
  ctx.fill();
  ctx.strokeStyle = 'rgba(56,189,248,0.3)'; ctx.lineWidth = 1.5; ctx.setLineDash([5, 5]);
  ctx.beginPath(); ctx.arc(ego.x, SEY, 180, -Math.PI * 0.65, -Math.PI * 0.35, false); ctx.stroke();
  ctx.setLineDash([]);
}

function drawHUD() {
  var sp = ego.spd / 120;
  ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.beginPath(); ctx.arc(W-50, H-50, 34, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#334155'; ctx.lineWidth = 4;
  ctx.beginPath(); ctx.arc(W-50, H-50, 30, -Math.PI*0.8, Math.PI*0.8); ctx.stroke();
  ctx.strokeStyle = sp > 0.8 ? '#f87171' : sp > 0.5 ? '#fbbf24' : '#34d399'; ctx.lineWidth = 4;
  ctx.beginPath(); ctx.arc(W-50, H-50, 30, -Math.PI*0.8, -Math.PI*0.8 + sp*Math.PI*1.6); ctx.stroke();
  ctx.fillStyle = '#e0e0e0'; ctx.font = 'bold 11px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText(Math.round(ego.spd), W-50, H-46);
  ctx.font = '8px sans-serif'; ctx.fillStyle = '#94a3b8'; ctx.fillText('km/h', W-50, H-34);
  ctx.fillStyle = 'rgba(0,0,0,0.45)'; ctx.beginPath(); ctx.roundRect(ROAD_X+4, 8, 90, 22, 5); ctx.fill();
  ctx.fillStyle = '#7dd3fc'; ctx.font = '11px sans-serif'; ctx.textAlign = 'left';
  ctx.fillText('차선:' + (ego.lane+1) + ' | ' + Math.round(ego.spd) + 'km/h', ROAD_X+10, 23);
}

// ── 메인 루프 ─────────────────────────────────────────
var lastT = 0;
function gameLoop(ts) {
  if (!running) return;
  var rawDt = lastT ? Math.min((ts - lastT) / 1000, 0.05) : 0.016;
  lastT = ts;
  var dt = rawDt * simSpd;

  moveAll(dt);
  clampObsObs();
  clampEgoObs();
  egoPhysics(dt);
  ego.x += (ego.tx - ego.x) * Math.min(1, 8 * dt);
  roadOff = (roadOff + ego.spd * dt * 0.8) % 9999;
  stats.dist += ego.spd * dt * 0.3;

  for (var i = 0; i < obstacles.length; i++) {
    var o = obstacles[i];
    if (!o.passed && o.wy < ego_wy && o.lane !== ego.lane) { o.passed = true; stats.avoid++; }
  }
  updateObsLifetime();

  if (stats.dist >= nextSpawnDist) {
    spawn();
    nextSpawnDist = stats.dist + 120 + Math.random() * 180;
  }
  decTimer += dt;
  if (decTimer > 0.7) { decTimer = 0; decide(); }

  ctx.clearRect(0, 0, W, H);
  drawRoad(); drawArc();
  obstacles.forEach(function(o) { drawCar(o.x, scy(o), o.w, o.h, o.color, '타차', false); });
  drawCar(ego.x, SEY, ego.w, ego.h, ego.color, 'AUTO', true);
  drawHUD();

  frame++;
  requestAnimationFrame(gameLoop);
}

function toggleSim() {
  running = !running;
  document.getElementById('btn-toggle').textContent = running ? '⏸ 일시정지' : '▶ 재개';
  if (running) { lastT = 0; frame = 0; requestAnimationFrame(gameLoop); }
}
function resetSim() {
  running = false; lastT = 0;
  document.getElementById('btn-toggle').textContent = '▶ 시작';
  ego_wy = 0;
  ego.lane = 1; ego.x = LC[1]; ego.tx = LC[1]; ego.spd = CRUISE; ego.changing = false;
  obstacles = []; roadOff = 0; stats = { dist:0, avoid:0, change:0, risk:0 };
  decTimer = 0; frame = 0; oid = 0; nextSpawnDist = 100;
  ctx.clearRect(0, 0, W, H); drawRoad();
  drawCar(ego.x, SEY, ego.w, ego.h, ego.color, 'AUTO', true);
  document.getElementById('log').innerHTML = '';
  updateUI({ go:.92, slow:.04, left:.02, right:.02, stop:.01, dF:999, dL:999, dR:999 }, 'go');
}
function updateSimSpeed(v) { simSpd = parseInt(v); document.getElementById('speed-lbl').textContent = 'x' + v; }

drawRoad();
drawCar(ego.x, SEY, ego.w, ego.h, ego.color, 'AUTO', true);
</script>
